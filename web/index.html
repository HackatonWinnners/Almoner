<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Almoner — Autonomous Microgrant Officer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:#EDEBE4;-webkit-font-smoothing:antialiased;}
  ::selection{background:#1A1A17;color:#F4F3EE;}
  table{border-collapse:collapse;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#D2D0C6;border:3px solid #EDEBE4;}
  @keyframes alm-pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  @keyframes alm-scan{0%{transform:translateX(-100%);}100%{transform:translateX(220%);}}
  /* hover affordances (the design used a runtime style-hover attr) */
  .alm-row{cursor:pointer;}
  .alm-row:hover{background:#F8F7F2 !important;}
  .alm-cosign:hover{background:#276641 !important;}
  .alm-reject:hover{background:#F4E6E3 !important;}
  .alm-open:hover{border-color:#1A1A17 !important;color:#1A1A17 !important;}
  .alm-ink:hover{background:#000 !important;}
  .alm-x:hover{border-color:#fff !important;color:#fff !important;}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
const h = React.createElement;
// Parse a CSS declaration string into a React style object so the design's
// inline style strings can be reused verbatim.
function S(str){ const o={}; String(str).split(';').forEach(p=>{ p=p.trim(); if(!p) return; const i=p.indexOf(':'); if(i<0) return; const k=p.slice(0,i).trim().replace(/-([a-z])/g,(_,c)=>c.toUpperCase()); o[k]=p.slice(i+1).trim(); }); return o; }

class App extends React.Component {
  MONO = "'IBM Plex Mono', ui-monospace, Menlo, monospace";
  WEIGHTS = [['Need',0.25],['Feasibility',0.20],['Impact / $',0.20],['Plan clarity',0.15],['Local legitimacy',0.10],['SDG alignment',0.10]];

  state = {
    role: 'funder',
    paused: false,
    selectedId: null,
    appScenario: 'active',
    appProvided: {},
    appPhase: 'idle',
    filters: { program: 'ALL', type: 'ALL', tier: 'ALL' },
    grants: this.seedGrants(),
  };

  // ---------- utilities ----------
  money(n){ if(n==null) return '—'; return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  rng(seed){ let x = seed % 2147483647; if(x<=0) x+=2147483646; return ()=> (x = x*16807 % 2147483647) / 2147483647; }
  hashFrom(seed,len){ const r=this.rng(seed); const hx='0123456789abcdef'; let s='0x'; for(let i=0;i<len;i++) s+=hx[Math.floor(r()*16)]; return s; }
  shortHash(f){ return f.slice(0,6)+'…'+f.slice(-4); }
  shortTx(f){ return f.slice(0,10)+'…'+f.slice(-6); }

  M(kind){
    const g=this.props.green||'#2F7A4E', a=this.props.amber||'#A9781B', r=this.props.red||'#B23A30';
    const t={
      green:['#E7F0E9',g,'#CADCCF'],
      amber:['#F4ECD9',a,'#E4D3A8'],
      red:['#F4E6E3',r,'#E2C4BE'],
      neutral:['#F0EEE7','#6E6D64','#E0DED5'],
      ink:['#1A1A17','#F4F3EE','#1A1A17'],
    }[kind] || ['#F0EEE7','#6E6D64','#E0DED5'];
    return { bg:t[0], fg:t[1], bd:t[2] };
  }
  statusKind(s){ return ({COMPLETE:'green',AWAIT_EVIDENCE:'amber',FLAGGED:'red',BLOCK:'red',REJECTED:'red'})[s] || 'neutral'; }
  tierKind(t){ return ({LOW:'green',MEDIUM:'amber',HIGH:'red',BLOCK:'red'})[t] || 'neutral'; }

  // ---------- element helpers ----------
  chip(text, kind, o){ o=o||{}; const c=this.M(kind);
    return h('span',{style:{display:'inline-flex',alignItems:'center',gap:5,padding:o.pad||'3px 8px',fontFamily:this.MONO,fontSize:o.fs||10.5,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',borderRadius:1,border:'1px solid '+c.bd,background:c.bg,color:c.fg,lineHeight:1,whiteSpace:'nowrap'}},
      o.dot ? h('span',{key:'d',style:{width:6,height:6,background:c.fg,display:'inline-block'}}) : null, text); }

  dot(kind,size){ const c=this.M(kind); return h('span',{style:{width:size||8,height:size||8,background:c.fg,display:'inline-block'}}); }

  bar(pct,kind,o){ o=o||{}; const c=this.M(kind); const col=o.color||c.fg;
    return h('div',{style:{height:o.h||6,background:o.track||'#E6E4DC',borderRadius:1,overflow:'hidden',width:'100%'}},
      h('div',{style:{width:Math.max(0,Math.min(100,pct))+'%',height:'100%',background:col}})); }

  meritChip(score){ const k=score>=78?'green':score>=55?'amber':'red'; const c=this.M(k);
    return h('span',{style:{display:'inline-flex',alignItems:'center',gap:7,fontFamily:this.MONO,fontSize:12,fontWeight:600,color:'#1A1A17'}},
      h('span',{key:'t',style:{width:36,height:6,background:'#E6E4DC',borderRadius:1,overflow:'hidden',display:'inline-block'}},
        h('span',{style:{display:'block',width:score+'%',height:'100%',background:c.fg}})),
      h('span',{key:'n',style:{fontVariantNumeric:'tabular-nums'}}, score)); }

  trancheEl(ms){ const map={released:'green',current:'amber',pending:'neutral',flagged:'red'};
    return h('div',{style:{display:'flex',gap:4}}, [0,1,2].map(i=>{
      const st = ms&&ms[i] ? ms[i].state : 'pending'; const c=this.M(map[st]||'neutral');
      const filled = st==='released'||st==='current'||st==='flagged';
      return h('span',{key:i,style:{width:23,height:15,display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:this.MONO,fontSize:8.5,fontWeight:600,border:'1px solid '+c.bd,background:filled?c.bg:'#fff',color:filled?c.fg:'#BBB9AF'}}, 'm'+(i+1)); })); }

  lifecycle(current){
    const steps=['INTAKE','SCREEN','SCORE','AWAIT_EVIDENCE','COMPLETE'];
    const order=steps.indexOf(current);
    const broke = current==='FLAGGED'||current==='BLOCK'||current==='REJECTED';
    const kids=[];
    steps.forEach((s,i)=>{
      let st='future';
      if(order>=0){ if(i<order) st='done'; else if(i===order) st='current'; }
      if(broke && i<=2) st='done';
      const c = st==='done'?this.M('green'):st==='current'?this.M('ink'):this.M('neutral');
      kids.push(h('span',{key:s,style:{display:'inline-flex',alignItems:'center',padding:'5px 9px',fontFamily:this.MONO,fontSize:10,fontWeight:600,letterSpacing:'0.04em',border:'1px solid '+(st==='future'?'#E0DED5':c.bd),background:st==='current'?c.bg:(st==='done'?this.M('green').bg:'#fff'),color:st==='current'?c.fg:(st==='done'?this.M('green').fg:'#A8A69C'),borderRadius:1,whiteSpace:'nowrap'}}, s.replace('_',' ')));
      if(i<steps.length-1) kids.push(h('span',{key:s+'_a',style:{color:'#C8C6BC',padding:'0 5px',fontSize:11}},'→'));
    });
    if(broke) kids.push(h('span',{key:'brk',style:{display:'inline-flex',alignItems:'center',marginLeft:8,padding:'5px 9px',fontFamily:this.MONO,fontSize:10,fontWeight:600,letterSpacing:'0.04em',border:'1px solid '+this.M('red').bd,background:this.M('red').bg,color:this.M('red').fg,borderRadius:1}}, '⟂ '+current));
    return h('div',{style:{display:'flex',alignItems:'center',flexWrap:'wrap',rowGap:6}}, kids); }

  pipeline(stages){
    const labs=['Completeness','Authenticity','Content match','Confidence'];
    return h('div',{style:{display:'flex',gap:2}}, labs.map((L,i)=>{
      const st=stages[i]||'pending';
      const k = st==='pass'?'green':st==='partial'?'amber':st==='fail'?'red':st==='active'?'ink':'neutral';
      const c=this.M(k);
      return h('div',{key:i,style:{flex:1,borderTop:'2px solid '+(st==='pending'?'#E0DED5':c.fg),paddingTop:6}},
        h('div',{style:{fontFamily:this.MONO,fontSize:8.5,letterSpacing:'0.03em',textTransform:'uppercase',color:st==='pending'?'#A8A69C':c.fg,fontWeight:600}}, L),
        h('div',{style:{fontFamily:this.MONO,fontSize:9,color:'#9C9A90',marginTop:2}}, st==='pending'?'—':(st==='active'?'checking…':st))); })); }

  confMeter(level){
    const order=['FAIL','UNCERTAIN','PARTIAL','PASS']; const idx=order.indexOf(level);
    const k = ({PASS:'green',PARTIAL:'amber',UNCERTAIN:'amber',FAIL:'red'})[level]||'neutral'; const c=this.M(k);
    return h('div',{style:{display:'flex',alignItems:'center',gap:9}},
      h('span',{key:'l',style:{fontFamily:this.MONO,fontSize:8.5,letterSpacing:'0.06em',textTransform:'uppercase',color:'#9C9A90'}},'confidence'),
      h('div',{key:'b',style:{display:'flex',gap:3,flex:1}}, order.map((o,i)=> h('span',{key:o,style:{flex:1,height:7,background:(idx>=0&&i<=idx)?c.fg:'#E6E4DC',borderRadius:1}}))),
      h('span',{key:'v',style:{fontFamily:this.MONO,fontSize:11,fontWeight:600,color:c.fg,letterSpacing:'0.04em'}}, level||'PENDING')); }

  burndownEl(){
    const pts=[2000,2000,1880,1880,1720,1720,1560,1460,1320,1240,1180];
    const W=900,H=70,pad=4,max=2000; const step=(W-pad*2)/(pts.length-1);
    const x=i=>pad+i*step, y=v=>pad+(1-v/max)*(H-pad*2);
    let d='M'+x(0)+' '+y(pts[0]); pts.forEach((v,i)=>{ if(i) d+=' L'+x(i)+' '+y(v); });
    const area=d+' L'+x(pts.length-1)+' '+(H-pad)+' L'+x(0)+' '+(H-pad)+' Z';
    return h('svg',{viewBox:'0 0 '+W+' '+H,preserveAspectRatio:'none',style:{width:'100%',height:60,display:'block'}},
      h('path',{key:'a',d:area,fill:this.props.green||'#2F7A4E',opacity:0.08}),
      h('path',{key:'l',d:d,fill:'none',stroke:this.props.green||'#2F7A4E',strokeWidth:1.5}),
      h('circle',{key:'c',cx:x(pts.length-1),cy:y(pts[pts.length-1]),r:3,fill:this.props.green||'#2F7A4E'})); }

  // ---------- data ----------
  makeMs(status,amount,seed,blocked){
    const pct=[40,40,20]; const amt=pct.map(p=>Math.round(amount*p/100));
    const base=pct.map((p,i)=>({tag:'M'+(i+1),pct:p,amount:amt[i],state:'pending',ev:['pending','pending','pending','pending'],conf:null,tx:null}));
    const tx=i=>this.hashFrom(seed*7+i+1,64);
    if(blocked){ base[0].state='flagged'; base[0].ev=['fail','fail','pending','pending']; base[0].conf='FAIL'; return base; }
    if(status==='COMPLETE'){ base.forEach((m,i)=>{ m.state='released'; m.ev=['pass','pass','pass','pass']; m.conf='PASS'; m.tx=tx(i); }); }
    else if(status==='AWAIT_EVIDENCE'){ base[0].state='released'; base[0].ev=['pass','pass','pass','pass']; base[0].conf='PASS'; base[0].tx=tx(0); base[1].state='current'; }
    else if(status==='FLAGGED'){ base[0].state='released'; base[0].ev=['pass','pass','pass','pass']; base[0].conf='PASS'; base[0].tx=tx(0); base[1].state='flagged'; base[1].ev=['pass','partial','fail','pending']; base[1].conf='FAIL'; }
    return base;
  }

  seedGrants(){
    const defs=[
      {seed:11,program:'WATER',amount:450,status:'SCORE',cos:true,tier:'LOW',subs:[90,82,86,80,72,74],blurb:'Hand-pump repair serving a 40-household cluster — spare parts plus a certified technician for two days.'},
      {seed:23,program:'EDU',amount:500,status:'SCORE',cos:true,tier:'MEDIUM',subs:[76,72,74,68,60,66],blurb:'Print run of 300 numeracy workbooks for an after-school program reaching three grades.'},
      {seed:37,program:'HEALTH',amount:300,status:'SCORE',cos:true,tier:'LOW',subs:[94,88,90,84,82,84],blurb:'Cold-chain carrier for a vaccine outreach covering two villages with no clinic within 12km.'},
      {seed:41,program:'FOOD',amount:200,status:'AWAIT_EVIDENCE',tier:'MEDIUM',subs:[74,70,70,66,62,60],blurb:'Seed and tool kit for a 12-member growers collective ahead of planting season.'},
      {seed:53,program:'ENERGY',amount:150,status:'AWAIT_EVIDENCE',tier:'LOW',subs:[82,78,84,74,72,72],blurb:'Solar lantern restock for a night clinic running on intermittent grid power.'},
      {seed:67,program:'WATER',amount:500,status:'COMPLETE',tier:'LOW',subs:[96,92,90,88,84,86],blurb:'Rain catchment tank installed at a primary school of 210 pupils — completed and verified.'},
      {seed:71,program:'EDU',amount:350,status:'FLAGGED',tier:'HIGH',subs:[66,62,60,58,54,56],blurb:'Tablet purchase for a digital-literacy pilot — milestone evidence failed authenticity checks.',flag:'duplicate'},
      {seed:83,program:'FOOD',amount:100,status:'SCREEN',tier:'LOW',subs:[72,68,70,64,60,62],blurb:'Community kitchen gas refill — auto-disbursement band, no operator co-sign required.'},
      {seed:97,program:'HEALTH',amount:250,status:'FLAGGED',tier:'BLOCK',subs:[58,52,50,48,44,46],blurb:'Data top-up request blocked pre-disbursement — wallet sits inside a sybil cluster.',flag:'sybil',blocked:true},
    ];
    return defs.map((d,i)=>{
      const full=this.hashFrom(d.seed,40);
      const merit=Math.round(d.subs.reduce((a,s,idx)=> a + s*this.WEIGHTS[idx][1], 0));
      return { id:'g'+(i+1), seed:d.seed, full, hash:this.shortHash(full), program:d.program, amount:d.amount, status:d.status, needsCosign:!!d.cos, tier:d.tier, subs:d.subs, merit, blurb:d.blurb, flag:d.flag||null, milestones:this.makeMs(d.status,d.amount,d.seed,d.blocked) };
    });
  }

  phrase(label,sub){
    const RAT={
      'Need':['Acute, unmet need; no alternative provider operating in the catchment.','Genuine need documented, though some services exist nearby.','Need is real but partially served by existing programs.'],
      'Feasibility':['Concrete plan with named suppliers and a realistic two-week window.','Feasible overall; the procurement timeline is slightly optimistic.','Execution risk concentrated in the sourcing step.'],
      'Impact / $':['High beneficiary count per dollar relative to the cohort.','Cost-effective and close to the cohort median.','Impact per dollar sits below the cohort median.'],
      'Plan clarity':['Milestones and line-item budget fully itemized.','Budget is clear but milestone detail is thin.','Plan lacks measurable, checkable milestones.'],
      'Local legitimacy':['Endorsed by three staked local actors with standing.','One local endorser on record with modest stake.','Limited independent local verification.'],
      'SDG alignment':['Direct fit to the stated SDG targets.','Partial alignment to the cited SDG.','Weak linkage to any SDG target.'],
    };
    const band = sub>=78?0 : sub>=55?1 : 2;
    return (RAT[label]||['','',''])[band];
  }

  signalsFor(g){
    const T=g.tier, dup=g.flag==='duplicate';
    if(T==='LOW') return [
      {label:'Wallet age',value:'214 days',kind:'green'},
      {label:'Sybil cluster',value:'none detected',kind:'green'},
      {label:'Duplicate content',value:'0% match',kind:'green'},
      {label:'Endorser stake',value:'3 endorsers · $0 slashed',kind:'green'} ];
    if(T==='MEDIUM') return [
      {label:'Wallet age',value:'96 days',kind:'amber'},
      {label:'Sybil cluster',value:'none detected',kind:'green'},
      {label:'Duplicate content',value:'11% match',kind:'amber'},
      {label:'Endorser stake',value:'1 endorser · staked',kind:'amber'} ];
    if(T==='HIGH') return [
      {label:'Wallet age',value:'34 days',kind:'amber'},
      {label:'Sybil cluster',value:'weak link (2 wallets)',kind:'amber'},
      {label:'Duplicate content',value:dup?'63% match — prior app':'19% match',kind:'red'},
      {label:'Endorser stake',value:'0 endorsers',kind:'red'} ];
    return [
      {label:'Wallet age',value:'4 days',kind:'red'},
      {label:'Sybil cluster',value:'cluster of 6 wallets',kind:'red'},
      {label:'Duplicate content',value:'24% match',kind:'amber'},
      {label:'Endorser stake',value:'0 endorsers',kind:'red'} ];
  }

  logFor(g){
    const L=[]; const a='AGENT', o='OPERATOR';
    L.push({actor:a,action:'GrantCreated',time:'−6d 09:12',rat:'Application received; intake fields complete and well-formed.'});
    if(g.flag==='sybil') L.push({actor:a,action:'Screen · BLOCK',time:'−6d 09:12',rat:'Originating wallet matches a known sybil cluster; disbursement blocked at screen.'});
    else L.push({actor:a,action:'Screened',time:'−6d 09:12',rat:'KYC-light and content-policy checks passed.'});
    L.push({actor:a,action:'RiskAssessed',time:'−6d 09:13',rat:'Composite risk tier '+g.tier+' from wallet age, sybil, duplicate and endorser signals.'});
    L.push({actor:a,action:'MeritScored',time:'−6d 09:14',rat:'Merit '+g.merit+'/100 across six weighted criteria.'});
    if(g.needsCosign) L.push({actor:a,action:'AwaitOperator',time:'−5d 16:40',rat:this.money(g.amount)+' falls in the $200–$500 human-review band; co-signature requested.'});
    if(g.status==='AWAIT_EVIDENCE'){ L.push({actor:o,action:'Co-signed',time:'−5d 10:02',rat:'Operator approved disbursement within wallet caps.'}); L.push({actor:a,action:'TrancheReleased',time:'−5d 10:02',rat:'M1 (40%) released; remaining tranches gate on verified evidence.'}); }
    if(g.status==='COMPLETE'){ L.push({actor:o,action:'Co-signed',time:'−14d',rat:'Operator approved disbursement.'}); L.push({actor:a,action:'TrancheReleased',time:'−14d',rat:'M1 (40%) released.'}); L.push({actor:a,action:'MilestoneVerified',time:'−9d',rat:'M2 evidence PASS — receipt, geo-photo and report matched.'}); L.push({actor:a,action:'TrancheReleased',time:'−9d',rat:'M2 (40%) released.'}); L.push({actor:a,action:'GrantCompleted',time:'−3d',rat:'M3 verified; final tranche released, grant closed.'}); }
    if(g.status==='FLAGGED'&&!g.blocked&&g.flag!=='sybil'){ L.push({actor:a,action:'TrancheReleased',time:'−10d',rat:'M1 (40%) released.'}); L.push({actor:a,action:'MilestoneFlagged',time:'−2d 14:20',rat:'M2 evidence failed content match — submitted photo reused from a prior grant.'}); }
    return L.reverse().map(e=>({ ...e, dotKind: e.action.indexOf('Flag')>=0||e.action.indexOf('BLOCK')>=0?'red': e.actor===o?'amber': (e.action.indexOf('Released')>=0||e.action.indexOf('Completed')>=0||e.action.indexOf('Verified')>=0)?'green':'neutral' }));
  }

  // ---------- handlers ----------
  setRole(r){ this.setState({ role:r, selectedId:null }); }
  openGrant(id){ this.setState({ selectedId:id }); }
  closeDrawer(){ this.setState({ selectedId:null }); }
  toggleKill(){ this.setState(s=>({ paused:!s.paused })); }
  cosign(id){ if(this.state.paused) return; this.setState(s=>({ selectedId: s.selectedId===id?null:s.selectedId, grants: s.grants.map(g=>{ if(g.id!==id) return g; const ms=g.milestones.map(m=>({...m})); ms[0].state='released'; ms[0].ev=['pass','pass','pass','pass']; ms[0].conf='PASS'; ms[0].tx=this.hashFrom(g.seed*7+1,64); ms[1].state='current'; return {...g,status:'AWAIT_EVIDENCE',needsCosign:false,milestones:ms}; }) })); }
  reject(id){ if(this.state.paused) return; this.setState(s=>({ selectedId: s.selectedId===id?null:s.selectedId, grants: s.grants.map(g=> g.id===id?{...g,status:'REJECTED',needsCosign:false}:g) })); }
  setApp(sc){ this.setState({ appScenario:sc, appPhase:'idle', appProvided:{} }); }
  attach(key){ this.setState(s=>({ appProvided:{...s.appProvided,[key]:true} })); }
  submitEvidence(){ this.setState({ appPhase:'verifying' }); setTimeout(()=>{ this.setState({ appPhase:'verified' }); }, 1700); }
  setFilter(k,v){ this.setState(s=>({ filters:{...s.filters,[k]:v} })); }

  buildDetail(g){
    const meritRows=this.WEIGHTS.map((w,i)=>{ const sub=g.subs[i]; const k=sub>=78?'green':sub>=55?'amber':'red';
      return { label:w[0], weight:w[1].toFixed(2), contribution:(sub*w[1]).toFixed(1), rat:this.phrase(w[0],sub), barEl:this.bar(sub,k,{h:7}) }; });
    const signals=this.signalsFor(g).map(s=>({ ...s, dotEl:this.dot(s.kind,9) }));
    const stMap={released:['green','Released'],current:['amber','Awaiting evidence'],pending:['neutral','Locked'],flagged:['red','Flagged']};
    const milestones=g.milestones.map(m=>{ const sm=stMap[m.state]||stMap.pending;
      return { tag:m.tag, pct:m.pct+'%', amount:this.money(m.amount), statusChip:this.chip(sm[1],sm[0],{dot:true}), pipelineEl:this.pipeline(m.ev), confEl:this.confMeter(m.conf), released:m.state==='released', txShort:m.tx?this.shortTx(m.tx):'' }; });
    const log=this.logFor(g).map(e=>({ ...e, actorChip:this.chip(e.actor, e.actor==='OPERATOR'?'amber':'neutral'), dotEl:this.dot(e.dotKind,9) }));
    const used=g.milestones.filter(m=>m.state==='released').reduce((a,m)=>a+m.amount,0);
    return {
      hash:g.hash, program:g.program, amount:this.money(g.amount),
      statusChip:this.chip(g.status.replace('_',' '), this.statusKind(g.status), {dot:true,fs:11}),
      tierChip:this.chip(g.tier+' risk', this.tierKind(g.tier), {dot:true,fs:11}),
      merit:g.merit, capsNote:'Recipient lifetime '+this.money(used)+' / $600.00  ·  per-tx ≤ $500.00  ·  24h period within $1,000.00  ·  pool within $2,000.00',
      meritRows, signals, milestones, log,
      needsCosign:g.needsCosign && g.status==='SCORE',
      firstTranche:this.money(g.milestones[0].amount),
      onClose:()=>this.closeDrawer(), onCosign:()=>this.cosign(g.id), onReject:()=>this.reject(g.id),
    };
  }

  buildApp(){
    const sc=this.state.appScenario;
    if(sc==='rejected'){
      return { scenario:sc, hash:'0x05a7…d12e', program:'EDU', isActive:false, isRejected:true, isFlagged:false,
        statusChip:this.chip('Not funded','red',{dot:true,fs:11}), statusLine:'Your application was reviewed and declined. The full rationale is on-chain.',
        lifecycleEl:this.lifecycle('REJECTED'),
        rejectRationale:'Merit scored 51/100 — below the funding line of 60. The plan lacked measurable milestones and impact-per-dollar fell well under the cohort median. Risk was acceptable; the decision was made on merit alone.',
        appealSteps:[{n:'1',text:'Add itemized milestones with checkable evidence types for each tranche.'},{n:'2',text:'Attach one staked local endorser to raise local-legitimacy score.'},{n:'3',text:'Resubmit within 30 days — the appeal re-enters scoring, not screening.'}],
        scenarioSwitch:this.appSwitch() };
    }
    if(sc==='flagged'){
      return { scenario:sc, hash:'0xc3b2…44f9', program:'HEALTH', isActive:false, isRejected:false, isFlagged:true,
        statusChip:this.chip('Held · flagged','red',{dot:true,fs:11}), statusLine:'Disbursement is paused pending a risk review. No funds are at risk.',
        lifecycleEl:this.lifecycle('FLAGGED'),
        flagReason:'Your wallet was grouped with five others showing near-identical activity (a possible sybil cluster). This is automated and may be a false positive.',
        flagSteps:[{n:'1',text:'Verify ownership by signing the challenge message sent to your wallet.'},{n:'2',text:'Add a staked local endorser who can vouch independently.'},{n:'3',text:'Once cleared, scoring resumes automatically — no need to reapply.'}],
        scenarioSwitch:this.appSwitch() };
    }
    // active — drive off the live AWAIT_EVIDENCE grant (g4 / seed 41)
    const g=this.state.grants.find(x=>x.seed===41) || this.state.grants[3];
    const provided=this.state.appProvided, phase=this.state.appPhase;
    const reqDefs=[['receipt','Receipt / invoice'],['geo','Geo-tagged photo'],['report','Short field report']];
    const allProvided=reqDefs.every(r=>provided[r[0]]);
    const reqTypes=reqDefs.map(r=>({ label:r[1], mark: provided[r[0]]?this.dot('green',9):h('span',{style:{width:9,height:9,border:'1px solid #C8C6BC',display:'inline-block'}}),
      action: provided[r[0]]
        ? this.chip('attached','green',{fs:9.5})
        : h('button',{onClick:()=>this.attach(r[0]),style:{background:'#fff',border:'1px solid #1A1A17',color:'#1A1A17',fontFamily:this.MONO,fontSize:10,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',padding:'5px 11px',cursor:'pointer'}},'Attach') }));
    let verifyBlock;
    if(phase==='verifying') verifyBlock=h('div',{style:{fontFamily:this.MONO,fontSize:11,color:this.props.amber||'#A9781B',display:'flex',alignItems:'center',gap:8}}, h('span',{style:{width:7,height:7,background:this.props.amber||'#A9781B',display:'inline-block',animation:'alm-pulse 1s infinite'}}), 'Agent verifying evidence — completeness · authenticity · content match…');
    else if(phase==='verified') verifyBlock=h('div',{style:{display:'flex',flexDirection:'column',gap:9}}, this.pipeline(['pass','pass','pass','pass']), this.confMeter('PASS'), h('div',{style:{fontFamily:this.MONO,fontSize:10.5,color:this.props.green||'#2F7A4E'}},'✓ M2 verified — tranche '+this.money(g.milestones[1].amount)+' released to your wallet.'));
    else verifyBlock=h('button',{onClick:()=>this.submitEvidence(),disabled:!allProvided,style:{width:'100%',background:allProvided?'#2F7A4E':'#E6E4DC',color:allProvided?'#fff':'#A8A69C',border:'none',fontFamily:this.MONO,fontSize:11,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',padding:11,cursor:allProvided?'pointer':'not-allowed'}}, allProvided?'Submit for verification':'Attach all required evidence to submit');

    const m2done = phase==='verified';
    const msStMap={released:['green','Released'],current:['amber','Evidence due'],pending:['neutral','Locked'],flagged:['red','Flagged']};
    const milestones=g.milestones.map((m,i)=>{ let state=m.state; if(i===1 && m2done) state='released'; if(i===2 && m2done) state='current';
      const sm=msStMap[state]||msStMap.pending;
      return { tag:m.tag, pct:m.pct+'%', amount:this.money(m.amount), statusChip:this.chip(sm[1],sm[0],{dot:true}),
        showUploader: i===1 && !m2done, showResult: (i===0) || (i===1 && m2done),
        locked: i===2 && !m2done,
        pipelineEl:this.pipeline(i===1?['pass','pass','pass','pass']:m.ev), confEl:this.confMeter(i===1?'PASS':m.conf), txShort:m.tx?this.shortTx(m.tx):(i===1&&m2done?this.shortTx(this.hashFrom(g.seed*7+2,64)):'') }; });
    const released = g.milestones[0].amount + (m2done? g.milestones[1].amount:0);
    const history=[{tag:'M1',tx:this.shortTx(g.milestones[0].tx),amount:this.money(g.milestones[0].amount),time:'5d ago'}];
    if(m2done) history.push({tag:'M2',tx:this.shortTx(this.hashFrom(g.seed*7+2,64)),amount:this.money(g.milestones[1].amount),time:'just now'});
    return { scenario:sc, hash:g.hash, program:g.program, isActive:true, isRejected:false, isFlagged:false,
      statusChip:this.chip('Awaiting evidence','amber',{dot:true,fs:11}), statusLine:'M1 released. Submit M2 evidence to unlock the next tranche.',
      lifecycleEl:this.lifecycle('AWAIT_EVIDENCE'), amount:this.money(g.amount), released:this.money(released), merit:g.merit,
      milestones, reqTypes, verifyBlock, history, noHistory:false, scenarioSwitch:this.appSwitch() };
  }

  appSwitch(){ const cur=this.state.appScenario;
    const opts=[['active','Active'],['rejected','Rejected'],['flagged','Flagged']];
    return h('div',{style:{display:'flex',border:'1px solid #D9D7CE'}}, opts.map((o,i)=> h('button',{key:o[0],onClick:()=>this.setApp(o[0]),style:{fontFamily:this.MONO,fontSize:10,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',padding:'7px 13px',cursor:'pointer',border:'none',borderLeft:i?'1px solid #E0DED5':'none',background:cur===o[0]?'#1A1A17':'#F4F3EE',color:cur===o[0]?'#F4F3EE':'#6E6D64'}}, o[1]))); }

    return h('button',{onClick:()=>this.toggleKill(),style:{display:'flex',alignItems:'center',gap:8,background:'#fff',color:'#B23A30',border:'1.5px solid #B23A30',fontFamily:this.MONO,fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',padding:'8px 15px',cursor:'pointer',position:'relative',overflow:'hidden'},

      onMouseLeave:e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.color='#B23A30';}}, h('span',{style:{fontSize:13,lineHeight:1}},'⏻'),'Pause all');

  capsMiniEl(){ const used=this.disbursedTotal(); const pct=Math.round(used/2000*100);
    return h('div',{style:{display:'flex',alignItems:'center',gap:10}},
      this.chip('under caps','green',{dot:true,fs:9.5}),

  disbursedTotal(){ return this.state.grants.reduce((a,g)=> a + g.milestones.filter(m=>m.state==='released').reduce((x,m)=>x+m.amount,0), 0); }

  buildEvents(){
    const evs=[]; let id=0; const push=o=>evs.push(Object.assign({id:'e'+(id++)},o));
    this.state.grants.forEach((g,gi)=>{
      const base=(gi+1)*220;
      push({type:'GrantCreated',kind:'neutral',program:g.program,tier:g.tier,recip:g.hash,amount:null,tx:this.hashFrom(g.seed*3,64),rat:this.hashFrom(g.seed*5,40),min:base+50,note:'Intake complete · request '+this.money(g.amount)});
      push({type:'RiskAssessed',kind:g.tier==='LOW'?'neutral':g.tier==='MEDIUM'?'amber':'red',program:g.program,tier:g.tier,recip:g.hash,amount:null,tx:this.hashFrom(g.seed*4,64),rat:this.hashFrom(g.seed*6,40),min:base+38,note:'Risk tier '+g.tier});
      g.milestones.forEach((m,mi)=>{
        if(m.state==='released'){ push({type:'TrancheReleased',kind:'green',program:g.program,tier:g.tier,recip:g.hash,amount:m.amount,tx:m.tx,rat:this.hashFrom(g.seed*9+mi,40),min:base-mi*18,note:m.tag+' · '+m.pct+'% tranche released'}); if(mi>0) push({type:'MilestoneVerified',kind:'green',program:g.program,tier:g.tier,recip:g.hash,amount:null,tx:this.hashFrom(g.seed*11+mi,64),rat:this.hashFrom(g.seed*13+mi,40),min:base-mi*18+4,note:m.tag+' evidence PASS'}); }
        if(m.state==='flagged'){ push({type:'MilestoneFlagged',kind:'red',program:g.program,tier:g.tier,recip:g.hash,amount:null,tx:this.hashFrom(g.seed*17+mi,64),rat:this.hashFrom(g.seed*19+mi,40),min:base-30,note:m.tag+' evidence FAIL · content match'}); }
      });
      if(g.status==='COMPLETE') push({type:'GrantCompleted',kind:'green',program:g.program,tier:g.tier,recip:g.hash,amount:g.amount,tx:this.hashFrom(g.seed*23,64),rat:this.hashFrom(g.seed*29,40),min:base-90,note:'All tranches verified · grant closed'});
    });
    push({type:'FundsReclaimed',kind:'amber',program:'EDU',tier:'HIGH',recip:'0x05a7…d12e',amount:210,tx:this.hashFrom(7777,64),rat:this.hashFrom(8888,40),min:60,note:'Milestone failed · unspent tranche returned to pool'});
    push({type:'ReputationUpdated',kind:'neutral',program:'WATER',tier:'LOW',recip:'0x9f0c…3b88',amount:null,tx:this.hashFrom(9999,64),rat:this.hashFrom(1212,40),min:48,note:'+1 completed grant · endorser stake released'});
    return evs.sort((a,b)=>a.min-b.min);
  }

  relTime(min){ if(min<60) return min+'m'; if(min<1440) return Math.round(min/60)+'h'; return Math.round(min/1440)+'d'; }

    const programs=['ALL'].concat([...new Set(allEvents.map(e=>e.program))]);
    const types=['ALL','GrantCreated','RiskAssessed','TrancheReleased','MilestoneVerified','MilestoneFlagged','GrantCompleted','FundsReclaimed','ReputationUpdated'];

      roleSwitcher:this.roleSwitch(), killBtn:this.killBtnEl(), capsMini:this.capsMiniEl(), paused:s.paused,
